<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Institute Receipt Capture</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ffffff" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<header>
  <h1>Institute Receipt Capture</h1>
</header>

<div class="container">
  <input type="text" id="sheetURL" placeholder="Paste Published Google Sheet URL" />
  <button onclick="loadSheet()">Load Sheet</button>

  <div class="sheet-wrapper">
    <iframe id="sheetFrame"></iframe>
    <div id="selectionBox"></div>
  </div>

  <button class="generate-btn" onclick="generateImage()">Generate Receipt Image</button>
</div>

<script src="script.js"></script>
</body>
</html>
